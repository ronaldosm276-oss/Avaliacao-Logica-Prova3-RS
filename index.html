<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prova 3</title>

    <script src="js/script.js" defer></script>

    <link rel="stylesheet" href="">

</head>
<body>
    <h3>AVALIAÇÃO - 3</h3>
    
    <p>Calculadora de preço de lote: R$ 550,00 por m2</p>
    <div id="geral">
        <form id="formulario">
            <label for="quadra">Quadra</label>
            <input type="text"  id="quadra" required>
            <br>
            <label for="lote">Lote</label>
            <input type="text"  id="lote" required>
            <br>
            <label for="comprimento">Comprimento (em m2)</label>
            <input type="number" step='0.1' id="comprimento" required>
            <br>
            <label for="largura">Largura (em m2)</label>
            <input type="number" step='0.1' id="largura" required>

            <button type="submit">ENVIAR</button>
            <button type="reset">LIMPAR</button>
           <div id="total">

           </div>
            
        </form>

        <div id="info">
            <hr>
        </div>
    </div>
</body>
</html>
